<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Готельно-ресторанний комплекс</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
}

/* Навігація */
nav {
  background:#000;
  padding:15px;
  text-align:center;
}

nav button {
  background:#e63946;
  color:#fff;
  border:none;
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
  border-radius:5px;
}

/* Секції */
section {
  padding:40px;
  display:none;
}

.active {
  display:block;
}

/* Карточки */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
}

/* Кнопки */
.btn {
  background:#e63946;
  color:#fff;
  padding:10px 20px;
  border:none;
  cursor:pointer;
  margin-top:10px;
  border-radius:5px;
}

/* Поля */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<nav>
  <button onclick="showPage('home')">Головна</button>
  <button onclick="showPage('reviews')">Відгуки</button>
  <button onclick="openRegister()">Реєстрація</button>
</nav>

<!-- ГОЛОВНА -->
<section id="home" class="active">
  <h2>Готель</h2>

  <div class="grid">
    <div class="card">Номери класу люкс</div>
    <div class="card">Ресторан</div>
    <div class="card">Басейн</div>
    <div class="card">Конференц-зал</div>
    <div class="card">Тераса</div>
  </div>
</section>

<!-- ВІДГУКИ -->
<section id="reviews">
  <h2>Відгуки</h2>

  <div id="reviewsList"></div>

  <h3>Додати відгук</h3>
  <textarea id="reviewText"></textarea>
  <button class="btn" onclick="addReview()">Відправити</button>
</section>

<!-- РЕЄСТРАЦІЯ -->
<div id="registerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a; justify-content:center; align-items:center;">
  
  <div style="background:#222; padding:20px; border-radius:10px; width:300px;">
    <h3>Реєстрація</h3>

    <input id="name" placeholder="Ім'я">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Пароль">

    <button class="btn" onclick="register()">Зареєструватись</button>
    <button class="btn" onclick="closeRegister()">Закрити</button>
  </div>

</div>

<script>

/* ================= ПЕРЕХІД СТОРІНОК ================= */
function showPage(page){

  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));

  document.getElementById(page).classList.add("active");
}

/* ================= РЕЄСТРАЦІЯ ================= */
function openRegister(){
  document.getElementById('registerModal').style.display='flex';
}

function closeRegister(){
  document.getElementById('registerModal').style.display='none';
}

function register(){

  let name = document.getElementById('name').value;
  let email = document.getElementById('email').value;
  let pass = document.getElementById('password').value;

  if(!name || !email || !pass){
    alert("Заповніть всі поля");
    return;
  }

  let users = JSON.parse(localStorage.getItem('users')) || [];

  users.push({name, email, pass});

  localStorage.setItem('users', JSON.stringify(users));

  alert("Успішна реєстрація ✔");
  closeRegister();
}

/* ================= ВІДГУКИ ================= */
function addReview(){

  let text = document.getElementById('reviewText').value;

  if(!text){
    alert("Введіть текст");
    return;
  }

  let reviews = JSON.parse(localStorage.getItem('reviews')) || [];

  reviews.push(text);

  localStorage.setItem('reviews', JSON.stringify(reviews));

  loadReviews();

  document.getElementById('reviewText').value = "";
}

function loadReviews(){

  let reviews = JSON.parse(localStorage.getItem('reviews')) || [];

  document.getElementById('reviewsList').innerHTML = reviews.map(r => 
    `<div class="card">${r}</div>`
  ).join('');
}

loadReviews();

</script>

</body>
</html>
