<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Готельно-ресторанний комплекс</title>

<style>
body { margin:0; font-family: Arial; background:#111; color:#fff; }
header { padding:20px; background:#000; text-align:center; }
section { padding:40px; }
h2 { text-align:center; margin-bottom:20px; }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }

.card {
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  opacity:0;
  transform:translateY(30px);
  transition:0.5s;
}

.card.show { opacity:1; transform:translateY(0); }

img { width:100%; border-radius:10px; }

.btn {
  background:#e63946;
  color:#fff;
  padding:10px 20px;
  border:none;
  cursor:pointer;
  margin-top:10px;
  border-radius:5px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

.dark { background:#000; }

</style>
</head>

<body>

<header>
  <h1>Готель + Ресторан</h1>
  <button class="btn" onclick="openRegister()">Реєстрація</button>
</header>

<!-- ПРО КОМПЛЕКС -->
<section>
  <h2>Про нас</h2>
  <p style="text-align:center">
    Сучасний 6-поверховий готельно-ресторанний комплекс з басейном, терасою та конференц-залом.
  </p>
</section>

<!-- РЕЄСТРАЦІЯ -->
<div id="registerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000a; justify-content:center; align-items:center;">
  <div style="background:#222; padding:20px; border-radius:10px; width:300px;">
    <h3>Реєстрація</h3>
    <input id="regName" placeholder="Ім'я">
    <input id="regEmail" placeholder="Email">
    <input id="regPass" type="password" placeholder="Пароль">
    <button class="btn" onclick="register()">Зареєструватись</button>
    <button class="btn" onclick="closeRegister()">Закрити</button>
  </div>
</div>

<!-- ВІДГУКИ -->
<section class="dark">
  <h2>Відгуки</h2>

  <div class="grid" id="reviews"></div>

  <h3>Залишити відгук</h3>
  <textarea id="reviewText" placeholder="Ваш відгук..."></textarea>
  <button class="btn" onclick="addReview()">Відправити</button>
</section>

<script>

// ================= РЕЄСТРАЦІЯ =================
function openRegister(){
  document.getElementById('registerModal').style.display='flex';
}

function closeRegister(){
  document.getElementById('registerModal').style.display='none';
}

function register(){
  let name = document.getElementById('regName').value;
  let email = document.getElementById('regEmail').value;
  let pass = document.getElementById('regPass').value;

  if(!name || !email || !pass){
    alert("Заповніть всі поля");
    return;
  }

  let users = JSON.parse(localStorage.getItem('users')) || [];

  users.push({name, email, pass});
  localStorage.setItem('users', JSON.stringify(users));

  alert("Реєстрація успішна ✔");
  closeRegister();
}

// ================= ВІДГУКИ =================
function addReview(){
  let text = document.getElementById('reviewText').value;

  if(!text){
    alert("Напишіть відгук");
    return;
  }

  let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
  reviews.push(text);

  localStorage.setItem('reviews', JSON.stringify(reviews));

  document.getElementById('reviewText').value = '';
  loadReviews();
}

function loadReviews(){
  let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
  let container = document.getElementById('reviews');

  container.innerHTML = reviews.map(r => `
    <div class="card show">${r}</div>
  `).join('');
}

// ================= Анімація =================
window.addEventListener('scroll', () => {
  document.querySelectorAll('.card').forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

// старт
loadReviews();

</script>

</body>
</html>
